<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Công cụ Kiểm thử Trích xuất Đề thi DOCX</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet">
  <style>
    :root {
      --primary: #059669;
      --primary-hover: #047857;
      --background: #f8fafc;
      --card-bg: #ffffff;
      --text: #1e293b;
      --text-muted: #64748b;
      --border: #e2e8f0;
      --shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.05), 0 2px 4px -1px rgba(0, 0, 0, 0.02);
    }
    body {
      font-family: 'Inter', sans-serif;
      background-color: var(--background);
      color: var(--text);
      margin: 0;
      padding: 40px 20px;
    }
    .container {
      max-width: 1000px;
      margin: 0 auto;
    }
    header {
      text-align: center;
      margin-bottom: 40px;
    }
    h1 {
      font-size: 2.2rem;
      font-weight: 900;
      color: #0f172a;
      margin-bottom: 10px;
    }
    .subtitle {
      color: var(--text-muted);
      font-size: 1.1rem;
    }
    .upload-zone {
      background: var(--card-bg);
      border: 2px dashed #cbd5e1;
      border-radius: 16px;
      padding: 40px;
      text-align: center;
      cursor: pointer;
      transition: all 0.2s ease;
      box-shadow: var(--shadow);
      margin-bottom: 30px;
    }
    .upload-zone:hover {
      border-color: var(--primary);
      background-color: #f0fdf4;
    }
    .upload-zone input {
      display: none;
    }
    .upload-zone p {
      font-size: 1.1rem;
      font-weight: 600;
      margin-top: 15px;
    }
    .btn {
      background: var(--primary);
      color: #fff;
      border: none;
      padding: 10px 20px;
      border-radius: 8px;
      font-weight: 700;
      cursor: pointer;
      font-size: 0.95rem;
      transition: background 0.2s;
    }
    .btn:hover {
      background: var(--primary-hover);
    }
    .stats {
      display: flex;
      gap: 15px;
      margin-bottom: 25px;
    }
    .stat-card {
      background: var(--card-bg);
      flex: 1;
      padding: 15px 20px;
      border-radius: 12px;
      border: 1px solid var(--border);
      font-weight: bold;
      box-shadow: var(--shadow);
    }
    .stat-value {
      font-size: 1.8rem;
      color: var(--primary);
      font-weight: 900;
      margin-top: 5px;
    }
    .question-card {
      background: var(--card-bg);
      border: 1px solid var(--border);
      border-radius: 16px;
      padding: 24px;
      margin-bottom: 20px;
      box-shadow: var(--shadow);
      position: relative;
    }
    .badge {
      display: inline-block;
      padding: 4px 10px;
      border-radius: 6px;
      font-size: 0.75rem;
      font-weight: 800;
      text-transform: uppercase;
      margin-right: 8px;
      margin-bottom: 12px;
    }
    .badge-section {
      background: #f1f5f9;
      color: #475569;
    }
    .badge-type {
      background: #dbeafe;
      color: #1e40af;
    }
    .qtext {
      font-size: 1.05rem;
      font-weight: 700;
      line-height: 1.5;
      margin-bottom: 16px;
      white-space: pre-wrap;
    }
    .choice-list {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 10px;
      margin-bottom: 16px;
      padding-left: 10px;
    }
    .choice-item {
      background: #f8fafc;
      padding: 10px 14px;
      border-radius: 8px;
      border: 1px solid var(--border);
      font-size: 0.9rem;
    }
    .choice-item.correct {
      background: #ecfdf5;
      border-color: #a7f3d0;
      color: #065f46;
      font-weight: 700;
    }
    .answer-line {
      font-size: 0.95rem;
      font-weight: 700;
      color: #059669;
      margin-bottom: 12px;
    }
    .explanation {
      background: #f8fafc;
      border-left: 4px solid #cbd5e1;
      padding: 12px 16px;
      font-size: 0.85rem;
      color: #475569;
      border-radius: 0 8px 8px 0;
    }
    .image-container {
      display: flex;
      flex-wrap: wrap;
      gap: 10px;
      margin-bottom: 15px;
    }
    .image-container img {
      max-width: 300px;
      max-height: 200px;
      border: 1px solid var(--border);
      border-radius: 8px;
    }
    #loading {
      text-align: center;
      font-size: 1.2rem;
      font-weight: 700;
      color: var(--primary);
      display: none;
      margin: 40px 0;
    }
    #results {
      margin-top: 30px;
    }
  </style>
</head>
<body>
  <div class="container">
    <header>
      <h1>Công cụ Kiểm thử Trích xuất Đề thi DOCX</h1>
      <div class="subtitle">Tải file .docx đề thi của bạn lên để xem kết quả phân tích cú pháp trích xuất</div>
    </header>

    <div class="upload-zone" onclick="document.getElementById('file-input').click()">
      <svg width="48" height="48" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24" style="color: var(--primary); margin: 0 auto;">
        <path stroke-linecap="round" stroke-linejoin="round" d="M7 16a4 4 0 01-.88-7.903A5 5 0 1115.9 6L16 6a5 5 0 011 9.9M15 13l-3-3m0 0l-3 3m3-3v12"/>
      </svg>
      <p>Nhấp vào đây hoặc kéo thả file .docx để kiểm thử</p>
      <input type="file" id="file-input" accept=".docx" onchange="handleFileSelect(event)">
    </div>

    <div id="loading">Đang phân tích cú pháp dữ liệu file Word...</div>

    <div id="stats-area" style="display: none;">
      <div class="stats">
        <div class="stat-card">
          Số câu trắc nghiệm (Phần I)
          <div id="stat-p1" class="stat-value">0</div>
        </div>
        <div class="stat-card">
          Số câu Đúng/Sai (Phần II)
          <div id="stat-p2" class="stat-value">0</div>
        </div>
        <div class="stat-card">
          Số câu điền số (Phần III)
          <div id="stat-p3" class="stat-value">0</div>
        </div>
      </div>
    </div>

    <div id="results"></div>
  </div>

  <script>
    /* ==========================================================================
       PARSER IMPLEMENTATION (Sao chép chính xác từ docxParser.js)
       ========================================================================== */
    function getParas(xml) {
      return [...xml.matchAll(/<w:p[ >][\s\S]*?<\/w:p>/g)].map(m => m[0]);
    }

    function parseOMathElement(elem) {
      const tag = elem.localName;
      if (tag === 'oMath') {
        return Array.from(elem.children).map(parseOMathElement).join('');
      } else if (tag === 'r') {
        const tNodes = elem.getElementsByTagNameNS('*', 't');
        return Array.from(tNodes).map(t => t.textContent || '').join('');
      } else if (tag === 'd') {
        let beg = '(';
        let end = ')';
        const dPr = Array.from(elem.children).find(c => c.localName === 'dPr');
        if (dPr) {
          const begChr = Array.from(dPr.children).find(c => c.localName === 'begChr');
          if (begChr) {
            beg = begChr.getAttribute('m:val') || begChr.getAttribute('val') || '(';
          }
          const endChr = Array.from(dPr.children).find(c => c.localName === 'endChr');
          if (endChr) {
            end = endChr.getAttribute('m:val') || endChr.getAttribute('val') || ')';
          }
        }
        const e = Array.from(elem.children).find(c => c.localName === 'e');
        const inner = e ? parseOMathElement(e) : '';
        return beg + inner + end;
      } else if (tag === 'acc') {
        let accentChar = '⃗';
        const accPr = Array.from(elem.children).find(c => c.localName === 'accPr');
        if (accPr) {
          const chr = Array.from(accPr.children).find(c => c.localName === 'chr');
          if (chr) {
            accentChar = chr.getAttribute('m:val') || chr.getAttribute('val') || '⃗';
          }
        }
        const e = Array.from(elem.children).find(c => c.localName === 'e');
        const inner = e ? parseOMathElement(e) : '';
        if (accentChar === '⃗' || accentChar === '\u20d7' || accentChar === '→') {
          return `\\vec{${inner}}`;
        } else if (accentChar === '^' || accentChar === '̂') {
          return Array.from(inner).map(c => /[a-zA-Z]/.test(c) ? c + '\u0302' : c).join('');
        }
        return inner;
      } else if (tag === 'f') {
        const numNode = Array.from(elem.children).find(c => c.localName === 'num');
        const denNode = Array.from(elem.children).find(c => c.localName === 'den');
        const num = numNode ? parseOMathElement(numNode) : '';
        const den = denNode ? parseOMathElement(denNode) : '';
        return `\\frac{${num}}{${den}}`;
      } else if (tag === 'limLow') {
        const eNode = Array.from(elem.children).find(c => c.localName === 'e');
        const limNode = Array.from(elem.children).find(c => c.localName === 'lim');
        const base = eNode ? parseOMathElement(eNode) : '';
        const limit = limNode ? parseOMathElement(limNode) : '';
        return `${base}_{${limit}}`;
      } else if (tag === 'sSub' || tag === 'sSup' || tag === 'sSubSup') {
        const eNode = Array.from(elem.children).find(c => c.localName === 'e');
        const subNode = Array.from(elem.children).find(c => c.localName === 'sub');
        const supNode = Array.from(elem.children).find(c => c.localName === 'sup');
        const base = eNode ? parseOMathElement(eNode) : '';
        const sub = subNode ? parseOMathElement(subNode) : '';
        const sup = supNode ? parseOMathElement(supNode) : '';
        let res = base;
        if (sub) res += `_${sub}`;
        if (sup) res += `^${sup}`;
        return res;
      } else if (tag === 'nary') {
        const subNode = Array.from(elem.children).find(c => c.localName === 'sub');
        const supNode = Array.from(elem.children).find(c => c.localName === 'sup');
        const eNode = Array.from(elem.children).find(c => c.localName === 'e');
        const sub = subNode ? parseOMathElement(subNode) : '';
        const sup = supNode ? parseOMathElement(supNode) : '';
        const inner = eNode ? parseOMathElement(eNode) : '';
        return `\\int_{${sub}}^{${sup}} ${inner}`;
      } else if (tag === 'bar') {
        const eNode = Array.from(elem.children).find(c => c.localName === 'e');
        const inner = eNode ? parseOMathElement(eNode) : '';
        return `\\bar{${inner}}`;
      } else {
        return Array.from(elem.children).map(parseOMathElement).join('');
      }
    }

    function getText(para, includeTab = false) {
      const parts = [];
      const tokenRe = /<w:r[ >][\s\S]*?<\/w:r>|<m:oMath>[\s\S]*?<\/m:oMath>/g;
      let m;
      const parser = new DOMParser();
      while ((m = tokenRe.exec(para)) !== null) {
        const tok = m[0];
        if (tok.startsWith('<w:r')) {
          if (includeTab && /<w:tab\/>/.test(tok)) parts.push('\t');
          const ts = [...tok.matchAll(/<w:t[^>]*>([\s\S]*?)<\/w:t>/g)].map(x => x[1]);
          parts.push(...ts);
        } else {
          try {
            const wrapXml = `<oMath xmlns:m="http://schemas.openxmlformats.org/officeDocument/2006/math" xmlns:w="http://schemas.openxmlformats.org/wordprocessingml/2006/main">${tok}</oMath>`;
            const doc = parser.parseFromString(wrapXml, 'application/xml');
            const root = doc.documentElement;
            parts.push(parseOMathElement(root));
          } catch (e) {
            const mt = [...tok.matchAll(/<m:t[^>]*>([\s\S]*?)<\/m:t>/g)].map(x => x[1]);
            if (mt.length) parts.push(mt.join(''));
          }
        }
      }
      return parts.join('');
    }

    function getColor(para) {
      const m = para.match(/<w:color w:val="([^"]+)"/);
      return m ? m[1].toUpperCase() : '';
    }

    function getHighlight(para) {
      const m = para.match(/<w:highlight w:val="([^"]+)"/);
      return m ? m[1] : '';
    }

    function getImagesInPara(para, relMap, imageBase64Map) {
      const rids = [];
      const embedRe = /embed="([^"]+)"/g;
      const idRe = /r:id="([^"]+)"/g;
      let m;
      while ((m = embedRe.exec(para)) !== null) rids.push(m[1]);
      while ((m = idRe.exec(para)) !== null) rids.push(m[1]);

      const imgs = [];
      for (const rid of rids) {
        const target = relMap[rid];
        if (target && imageBase64Map[target]) {
          imgs.push(imageBase64Map[target]);
        }
      }
      return imgs;
    }

    function parseChoices(raw) {
      const tabParts = raw.split('\t').map(s => s.trim()).filter(Boolean);
      const choices = [];
      for (const part of tabParts) {
        const innerRe = /\b([A-D])\.\s*(.*?)(?=\s+\b[A-D]\.\s|$)/g;
        let cm;
        while ((cm = innerRe.exec(part)) !== null) {
          const text = cm[2].replace(/\s+/g, ' ').trim().replace(/\.\s*$/, '').trim();
          if (cm[1] && !choices.find(c => c.key === cm[1])) {
            choices.push({ key: cm[1], text });
          }
        }
      }
      if (choices.length < 2) {
        choices.length = 0;
        const re = /\b([A-D])\.\s*(.*?)(?=\s+\b[A-D]\.\s|$)/g;
        let cm;
        while ((cm = re.exec(raw)) !== null) {
          const text = cm[2].replace(/\s+/g, ' ').trim().replace(/\.\s*$/, '').trim();
          if (text && !choices.find(c => c.key === cm[1])) {
            choices.push({ key: cm[1], text });
          }
        }
      }
      choices.sort((a, b) => a.key.charCodeAt(0) - b.key.charCodeAt(0));
      return choices;
    }

    function parseAnswer(text, section = 'I') {
      const m = text.match(/(?:Lời\s+giải|Trả\s+lời|Đáp\s+án)\s*[:\-]?\s*(.+)/i);
      if (!m) return null;
      const raw = m[1].trim();
      if (section === 'III') {
        const numM = raw.match(/^(-?\d+(?:[.,]\d+)?)(.*)/);
        if (numM) {
          return { type: 'short', val: numM[1].trim(), rest: numM[2].trim() };
        }
        return { type: 'short', val: raw, rest: '' };
      }
      if (/^[A-D]$/i.test(raw)) return { type: 'abcd', val: raw.toUpperCase() };
      if (/[SĐ]/.test(raw)) {
        const vals = raw.split(/[-–]/).map(s => s.trim()).filter(Boolean);
        return { type: 'tf', vals };
      }
      return { type: 'abcd', val: raw.toUpperCase() };
    }

    function parseFromXml(xml, relMap = {}, imageBase64Map = {}) {
      const paras = getParas(xml);
      const questions = [];

      const classified = paras.map(p => {
        const hl    = getHighlight(p);
        const color = getColor(p);
        const rawText = getText(p, true);
        const text    = getText(p, false);
        
        let type = 'other';
        if (hl === 'yellow' || /^\s*(?:Lời\s+giải|Trả\s+lời|Đáp\s+án)/i.test(text))        type = 'answer';
        else if (color === 'C00000') type = 'choices';
        else if (/^\s*Câu\s+\d+/i.test(text) || (color === '0000FF' && /Câu\s+\d+/i.test(text))) type = 'question';
        
        return { type, rawText, text, para: p };
      });

      let i = 0;
      let currentSection = 'I';

      while (i < classified.length) {
        const item = classified[i];
        if (/Phần\s+III/i.test(item.text) && !/Câu\s+\d+/i.test(item.text)) {
          currentSection = 'III';
          i++; continue;
        }
        if (/Phần\s+II/i.test(item.text) && !/Câu\s+\d+/i.test(item.text)) {
          currentSection = 'II';
          i++; continue;
        }
        if (/Phần/i.test(item.text) && !/^\s*Câu\s+\d+/i.test(item.text)) {
          i++; continue;
        }

        if (item.type === 'question' && /^\s*Câu\s+\d+/i.test(item.text)) {
          const numM = item.text.match(/Câu\s+(\d+)/i);
          const num  = numM ? parseInt(numM[1]) : 0;
          const tagM = item.text.match(/\[([^\]]+)\]/);
          const tag  = tagM ? tagM[1] : null;

          let qtext = item.text
            .replace(/^\s*Câu\s+\d+[\s.:]+/i, '')
            .replace(/^\[[^\]]+\]\s*/, '')
            .trim();

          if (!qtext || /^Phần/i.test(qtext)) { i++; continue; }

          const block = { 
            num, 
            tag, 
            section: currentSection, 
            qtext, 
            choices: [], 
            answer: null, 
            solution: [], 
            tfStatements: [],
            images: getImagesInPara(item.para, relMap, imageBase64Map),
            sol_images: []
          };

          i++;
          while (i < classified.length) {
            const cur = classified[i];
            if (/Phần\s+(?:II|III)/i.test(cur.text)) break;
            if (cur.type === 'question' && /^\s*Câu\s+\d+/i.test(cur.text)) break;

            const pImages = getImagesInPara(cur.para, relMap, imageBase64Map);
            if (block.answer === null) {
              block.images.push(...pImages);
            } else {
              block.sol_images.push(...pImages);
            }

            if (cur.type === 'choices') {
              const parsed = parseChoices(cur.rawText);
              for (const c of parsed) {
                if (!block.choices.find(x => x.key === c.key)) block.choices.push(c);
              }
            } else if (cur.type === 'answer') {
              const ansObj = parseAnswer(cur.text, currentSection);
              if (ansObj) {
                if (ansObj.rest) {
                  block.answer = { type: ansObj.type, val: ansObj.val };
                  block.solution.push(ansObj.rest);
                } else {
                  block.answer = ansObj;
                }
              }
            } else if (cur.type === 'other' && cur.text.trim()) {
              const t = cur.text.trim();
              if (currentSection === 'II' && block.answer === null) {
                const stmtM = t.match(/^([a-d])\)\s*(.+)/i);
                const hasNumPr = cur.para.includes('<w:numPr>');
                
                if (stmtM) {
                  block.tfStatements.push({ key: stmtM[1].toLowerCase(), text: stmtM[2].trim() });
                } else if (hasNumPr || block.tfStatements.length === 0) {
                  const key = String.fromCharCode(97 + block.tfStatements.length);
                  block.tfStatements.push({ key: key, text: t });
                } else {
                  block.tfStatements[block.tfStatements.length - 1].text += " " + t;
                }
              } else if (block.answer === null) {
                block.qtext += " " + t;
              } else {
                block.solution.push(t);
              }
            }
            i++;
          }
          block.images = [...new Set(block.images)];
          block.sol_images = [...new Set(block.sol_images)];
          questions.push(block);
        } else {
          i++;
        }
      }
      return questions;
    }

    async function decompressDeflateToBytes(compData) {
      const stream = new DecompressionStream('deflate-raw');
      const writer = stream.writable.getWriter();
      writer.write(compData);
      writer.close();

      const chunks = [];
      const reader = stream.readable.getReader();
      while (true) {
        const { done, value } = await reader.read();
        if (done) break;
        chunks.push(value);
      }
      const total  = chunks.reduce((s, c) => s + c.length, 0);
      const merged = new Uint8Array(total);
      let offset   = 0;
      for (const c of chunks) { merged.set(c, offset); offset += c.length; }
      return merged;
    }

    async function decompressDeflate(compData, uncompSize) {
      const bytes = await decompressDeflateToBytes(compData);
      return new TextDecoder('utf-8').decode(bytes);
    }

    function bytesToBase64DataUrl(bytes, name) {
      let binary = '';
      const len = bytes.byteLength;
      const chunkSize = 8192;
      for (let i = 0; i < len; i += chunkSize) {
        const chunk = bytes.subarray(i, i + chunkSize);
        binary += String.fromCharCode.apply(null, chunk);
      }
      const base64 = window.btoa(binary);
      const ext = name.split('.').pop().toLowerCase();
      
      let mime = 'image/png';
      if (ext === 'jpg' || ext === 'jpeg') mime = 'image/jpeg';
      else if (ext === 'gif') mime = 'image/gif';
      else if (ext === 'svg') mime = 'image/svg+xml';
      else if (ext === 'wdp') mime = 'image/vnd.ms-photo';
      
      return `data:${mime};base64,${base64}`;
    }

    async function unzipAllMediaAndXml(bytes) {
      const sig = [0x50, 0x4b, 0x03, 0x04];
      const decoder = new TextDecoder('utf-8');
      let pos = 0;
      let docXml = '';
      let relsXml = '';
      const mediaFiles = {};

      while (pos < bytes.length - 30) {
        if (bytes[pos]   !== sig[0] || bytes[pos+1] !== sig[1] ||
            bytes[pos+2] !== sig[2] || bytes[pos+3] !== sig[3]) {
          pos++; continue;
        }

        const compression  = bytes[pos+8]  | (bytes[pos+9]  << 8);
        const compSize     = bytes[pos+18] | (bytes[pos+19] << 8) | (bytes[pos+20] << 16) | (bytes[pos+21] << 24);
        const uncompSize   = bytes[pos+22] | (bytes[pos+23] << 8) | (bytes[pos+24] << 16) | (bytes[pos+25] << 24);
        const nameLen      = bytes[pos+26] | (bytes[pos+27] << 8);
        const extraLen     = bytes[pos+28] | (bytes[pos+29] << 8);

        const nameBytes = bytes.slice(pos+30, pos+30+nameLen);
        const name      = decoder.decode(nameBytes);
        const dataStart = pos + 30 + nameLen + extraLen;
        const dataEnd   = dataStart + compSize;

        if (name === 'word/document.xml') {
          const compData = bytes.slice(dataStart, dataEnd);
          docXml = compression === 0 ? decoder.decode(compData) : await decompressDeflate(compData, uncompSize);
        } else if (name === 'word/_rels/document.xml.rels') {
          const compData = bytes.slice(dataStart, dataEnd);
          relsXml = compression === 0 ? decoder.decode(compData) : await decompressDeflate(compData, uncompSize);
        } else if (name.startsWith('word/media/')) {
          const compData = bytes.slice(dataStart, dataEnd);
          let decompressed;
          if (compression === 0) {
            decompressed = compData;
          } else if (compression === 8) {
            decompressed = await decompressDeflateToBytes(compData);
          }
          if (decompressed) {
            mediaFiles[name] = decompressed;
          }
        }
        pos = dataEnd;
      }
      return { docXml, relsXml, mediaFiles };
    }

    async function extractQuestionsFromDocx(file) {
      if (!file || !file.name.endsWith('.docx')) {
        throw new Error('Chỉ hỗ trợ file định dạng .docx (Microsoft Word)');
      }
      const ab = await file.arrayBuffer();
      const bytes = new Uint8Array(ab);
      const { docXml, relsXml, mediaFiles } = await unzipAllMediaAndXml(bytes);
      const imageBase64Map = {};
      for (const [name, imgBytes] of Object.entries(mediaFiles)) {
        imageBase64Map[name] = bytesToBase64DataUrl(imgBytes, name);
      }
      const relMap = {};
      if (relsXml) {
        const relRe = /<Relationship\s+([^>]+)\/>/g;
        let rm;
        while ((rm = relRe.exec(relsXml)) !== null) {
          const rel = rm[1];
          const idM = rel.match(/Id="([^"]+)"/);
          const targetM = rel.match(/Target="([^"]+)"/);
          const typeM = rel.match(/Type="([^"]+)"/);
          if (idM && targetM && typeM && typeM[1].includes('relationships/image')) {
            let target = targetM[1];
            if (!target.startsWith('word/')) {
              target = 'word/' + target;
            }
            relMap[idM[1]] = target;
          }
        }
      }
      return parseFromXml(docXml, relMap, imageBase64Map);
    }

    /* ==========================================================================
       UI INTERACTION
       ========================================================================== */
    async function handleFileSelect(event) {
      const file = event.target.files[0];
      if (!file) return;

      const loading = document.getElementById('loading');
      const resultsDiv = document.getElementById('results');
      const statsArea = document.getElementById('stats-area');

      loading.style.display = 'block';
      resultsDiv.innerHTML = '';
      statsArea.style.display = 'none';

      try {
        const questions = await extractQuestionsFromDocx(file);
        loading.style.display = 'none';

        if (questions.length === 0) {
          resultsDiv.innerHTML = '<div style="text-align: center; padding: 40px; color: var(--text-muted);">Không tìm thấy câu hỏi hợp lệ nào theo định dạng quy chuẩn!</div>';
          return;
        }

        // Count stats
        const p1 = questions.filter(q => q.section === 'I').length;
        const p2 = questions.filter(q => q.section === 'II').length;
        const p3 = questions.filter(q => q.section === 'III').length;

        document.getElementById('stat-p1').innerText = p1;
        document.getElementById('stat-p2').innerText = p2;
        document.getElementById('stat-p3').innerText = p3;
        statsArea.style.display = 'block';

        questions.forEach((q, index) => {
          const card = document.createElement('div');
          card.className = 'question-card';

          const sectName = q.section === 'I' ? 'Phần I (Trắc nghiệm nhiều lựa chọn)' : q.section === 'II' ? 'Phần II (Phát biểu Đúng/Sai)' : 'Phần III (Trả lời ngắn/Điền số)';
          const typeName = q.section === 'III' ? 'Điền số' : 'Trắc nghiệm';

          // Images inside question text
          let imagesHtml = '';
          if (q.images && q.images.length > 0) {
            imagesHtml = `<div class="image-container">` + q.images.map(src => `<img src="${src}" alt="Hình ảnh câu hỏi" />`).join('') + `</div>`;
          }

          // Choices
          let choicesHtml = '';
          if (q.section === 'I' && q.choices && q.choices.length > 0) {
            choicesHtml = `<div class="choice-list">`;
            q.choices.forEach(c => {
              const isCorrect = q.answer && q.answer.val === c.key;
              choicesHtml += `
                <div class="choice-item ${isCorrect ? 'correct' : ''}">
                  <strong>${c.key}.</strong> ${c.text}
                </div>
              `;
            });
            choicesHtml += `</div>`;
          } else if (q.section === 'II' && q.tfStatements && q.tfStatements.length > 0) {
            choicesHtml = `<div style="margin-bottom: 16px; padding-left: 10px; display: flex; flex-direction: column; gap: 8px;">`;
            q.tfStatements.forEach((stmt, idx) => {
              const ansVal = q.answer && q.answer.vals ? q.answer.vals[idx] : 'Chưa rõ';
              choicesHtml += `
                <div class="choice-item" style="display: flex; justify-content: space-between;">
                  <span><strong>${stmt.key})</strong> ${stmt.text}</span>
                  <span class="badge" style="background: #ecfdf5; color: #065f46; margin: 0;">Đáp án: ${ansVal}</span>
                </div>
              `;
            });
            choicesHtml += `</div>`;
          }

          // Answers
          let ansText = 'Không tìm thấy hoặc không phân tích được';
          if (q.answer) {
            if (q.answer.type === 'abcd') ansText = q.answer.val;
            else if (q.answer.type === 'short') ansText = q.answer.val;
            else if (q.answer.type === 'tf') ansText = q.answer.vals.join(' - ');
          }

          // Solutions
          let solutionHtml = '';
          if (q.solution && q.solution.length > 0) {
            solutionHtml = `<div class="explanation"><strong>Lời giải chi tiết:</strong><br/>${q.solution.join('<br/>')}</div>`;
          }

          // Solution images
          let solImagesHtml = '';
          if (q.sol_images && q.sol_images.length > 0) {
            solImagesHtml = `<div class="image-container" style="margin-top: 10px;">` + q.sol_images.map(src => `<img src="${src}" alt="Hình ảnh lời giải" />`).join('') + `</div>`;
          }

          card.innerHTML = `
            <div>
              <span class="badge badge-section">${sectName}</span>
              <span class="badge badge-type">${typeName}</span>
              <span style="font-weight: 800; color: var(--text-muted);">Câu số ${q.num || (index + 1)}</span>
            </div>
            <div class="qtext">${q.qtext}</div>
            ${imagesHtml}
            ${choicesHtml}
            <div class="answer-line">Đáp án phân tích được: ${ansText}</div>
            ${solutionHtml}
            ${solImagesHtml}
          `;

          resultsDiv.appendChild(card);
        });

      } catch (err) {
        loading.style.display = 'none';
        resultsDiv.innerHTML = `<div style="padding: 20px; background: #fee2e2; color: #991b1b; border-radius: 12px; font-weight: bold;">Lỗi: ${err.message}</div>`;
      }
    }
  </script>
